apiVersion: batch/v1
kind: CronJob
metadata:
  name: tradingagents-nvda-daily
  namespace: tradingagents
spec:
  schedule: "0 21 * * 1-5" # 9 PM UTC (after US market close) Mon-Fri
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: trader
            image: ghcr.io/madhuboyin/tradingagents:latest-arm64
            imagePullPolicy: Always
            args: ["trade", "NVDA"]
            envFrom:
            - secretRef:
                name: tradingagents-secrets
            env:
            - name: TRADINGAGENTS_LLM_PROVIDER
              value: "google"
            - name: TRADINGAGENTS_DEEP_THINK_LLM
              value: "gemini-2.5-flash"
            - name: TRADINGAGENTS_QUICK_THINK_LLM
              value: "gemini-2.5-flash"
            - name: TRADINGAGENTS_WEBHOOK_URL
              value: "http://tradingagents-dashboard-svc.tradingagents.svc.cluster.local/api/webhook/progress"
            volumeMounts:
            - name: data
              mountPath: /home/appuser/.tradingagents
          restartPolicy: OnFailure
          volumes:
          - name: data
            persistentVolumeClaim:
              claimName: tradingagents-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tradingagents-dashboard
  namespace: tradingagents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
      - name: dashboard
        image: ghcr.io/madhuboyin/tradingagents-dashboard:latest-arm64
        imagePullPolicy: Always
        ports:
        - containerPort: 8000 # API + UI
        envFrom:
        - secretRef:
            name: tradingagents-secrets
        env:
        - name: TRADINGAGENTS_LLM_PROVIDER
          value: "google"
        - name: TRADINGAGENTS_DEEP_THINK_LLM
          value: "gemini-2.5-flash"
        - name: TRADINGAGENTS_QUICK_THINK_LLM
          value: "gemini-2.5-flash"
        volumeMounts:
        - name: data
          mountPath: /home/appuser/.tradingagents
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: tradingagents-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: tradingagents-dashboard-svc
  namespace: tradingagents
spec:
  selector:
    app: dashboard
  ports:
  - name: web
    port: 80
    targetPort: 8000
  type: ClusterIP
