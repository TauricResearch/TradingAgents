name: Deploy MkDocs site to Pages

# Source report Markdown under docs/ is gitignored and never reaches the
# remote, so CI has nothing to build from. The site is published from a local
# `mkdocs gh-deploy` to the gh-pages branch instead. This workflow is kept for
# reference / manual runs only and no longer auto-deploys on push to main.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install ".[docs]"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Regenerate derived report artifacts
        # complete_report.md, docs/index.md, and ticker hubs are gitignored;
        # rebuild them from the committed stage files before the strict build.
        run: python scripts/report_workflow.py --allow-incomplete --allow-summary-na

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
