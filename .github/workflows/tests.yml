name: Tests

on:
  push:
    branches:
      - main
      - "claude/**"
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  unit:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install package and test dependencies
        run: pip install -e ".[test]" pytest

      - name: Run unit tests
        run: pytest -m unit -v --tb=short
        env:
          # Dummy keys so the test suite stays offline
          OPENAI_API_KEY: placeholder
          ANTHROPIC_API_KEY: placeholder
          GOOGLE_API_KEY: placeholder
          XAI_API_KEY: placeholder
          DEEPSEEK_API_KEY: placeholder
          DASHSCOPE_API_KEY: placeholder
          ZHIPU_API_KEY: placeholder
          OPENROUTER_API_KEY: placeholder
          AZURE_OPENAI_API_KEY: placeholder
          ALPHA_VANTAGE_API_KEY: placeholder
          OMLX_API_KEY: placeholder
