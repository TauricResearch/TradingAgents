name: CI

on:
  push:
    branches: [main, main-with-dashboard]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with dev extras)
        run: uv sync --extra dev
      - name: Run test suite
        run: uv run pytest -q

  smoke-install:
    name: clean-install smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Fresh install (no dev extras) and import
        run: |
          uv sync
          uv run python -c "import tradingagents, cli.main; print('clean-install import OK')"

  lint:
    name: ruff (strict, full repo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Install ruff
        run: uv sync --extra dev
      - name: Lint the repository
        run: uv run ruff check .

  deploy:
    name: deploy to render
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/main-with-dashboard') && github.event_name == 'push'
    needs: [test, lint, smoke-install]
    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
