site_name: TradingAgents Reports
site_description: Multi-agent LLM trading analysis runs
site_url: https://bichengwang.github.io/TradingAgents/
repo_url: https://github.com/BichengWang/TradingAgents
repo_name: BichengWang/TradingAgents
docs_dir: docs
site_dir: _site

theme:
  name: material
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols

# Search is intentionally disabled. The client-side search index grew to
# ~204 MB (full body text of every run, indexed twice), which exhausted browser
# tab memory and crashed the page ("Aw, Snap! Error 5"). An empty plugins list
# turns off the default search plugin so no search_index.json is generated.
plugins: []

extra_css:
  - stylesheets/extra.css

not_in_nav: |
  /**/[1-5]_*/**.md

copyright: >
  Generated by an LLM research agent. Not financial advice.
