# IIC F3 Redis configuration.
#
# NOTE: This file is NOT currently loaded by the running `iic-redis` container.
# That container is started with plain `redis-server --appendonly yes` and
# ignores this file entirely. The settings below document the intended
# durability/eviction profile and are NOT in effect today.
#
# To actually load it, mount this file into the container and pass --include,
# e.g.:
#   docker run --name iic-redis \
#     -v /srv/iic/redis:/data \
#     -v /home/ziwei-huang/TradingAgents/TradingAgents/ops/redis/redis.conf:/etc/redis/redis.conf:ro \
#     redis:7 redis-server --include /etc/redis/redis.conf
# `dir /data` below matches the container's mounted volume (host /srv/iic/redis).
#
# Durability: AOF every 1s — at most 1s of in-flight envelopes lost on crash.
# Eviction:   none — we never silently drop sensed events.

appendonly yes
appendfsync everysec
maxmemory 256mb
maxmemory-policy noeviction
save ""
dir /data
