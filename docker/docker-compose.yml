services:
  pulse-trading-signals-service:
    image: registry.pulsenow.io/pulse/trading-signals-service:latest
    container_name: pulse-trading-signals-service
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    env_file:
      - .env
    ports:
      - "127.0.0.1:${TRADING_SIGNALS_PORT:-8050}:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - trading-signals-data:/home/appuser/.tradingagents
    networks:
      - pulse-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/signals-ms/health', timeout=5).getcode()==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: pulse-trading-signals-redis
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "2"
    volumes:
      - trading-signals-redis-data:/data
    networks:
      pulse-network:
        aliases:
          - pulse-trading-signals-redis
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --bind 127.0.0.1 --protected-mode yes

volumes:
  trading-signals-data:
    driver: local
    name: pulse-trading-signals-data
  trading-signals-redis-data:
    driver: local
    name: pulse-trading-signals-redis-data

networks:
  pulse-network:
    external: true
    name: pulse-network
