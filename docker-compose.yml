# docker-compose.yml for Pulse Trading Signals Microservice

services:
  trading-signals-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist SQLite databases, caching, and logs on the host
      - tradingagents_data:/home/appuser/.tradingagents
    restart: unless-stopped

volumes:
  tradingagents_data:
