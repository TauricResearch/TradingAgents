services:
  tradingagents:
    build: .
    env_file:
      - .env
    environment:
      # Land reports under the bind-mounted docs/ so they appear on the host
      # and feed the MkDocs site directly.
      - TRADINGAGENTS_REPORTS_DIR=/workspace/docs
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
      - ./docs:/workspace/docs
    tty: true
    stdin_open: true

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  tradingagents-ollama:
    build: .
    env_file:
      - .env
    environment:
      - TRADINGAGENTS_LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434/v1
      - TRADINGAGENTS_REPORTS_DIR=/workspace/docs
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
      - ./docs:/workspace/docs
    depends_on:
      - ollama
    tty: true
    stdin_open: true
    profiles:
      - ollama

volumes:
  tradingagents_data:
  ollama_data:
