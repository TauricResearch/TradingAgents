services:
  tradingagents:
    build: .
    env_file:
      - .env
    environment:    volumes:
      - tradingagents_data:/home/appuser/.tradingagents      # Bind-mount the host docs dir so TRADINGAGENTS_REPORTS_DIR resolves
      # to the same absolute path inside the container as on the host.
      # docs/ is also the GitHub Pages source, so reports land where Pages
      # serves them — no extra copy step.
      - /Users/bichengwang/my-code/other/TradingAgents/docs:/Users/bichengwang/my-code/other/TradingAgents/docs
    tty: true
    stdin_open: true

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  tradingagents-ollama:
    build: .
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=ollama
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    depends_on:
      - ollama
    tty: true
    stdin_open: true
    profiles:
      - ollama

volumes:
  tradingagents_data:
  ollama_data:
