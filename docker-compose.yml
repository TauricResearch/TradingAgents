services:
  tradingagents:
    build: .
    env_file:
      - .env
    environment:
      - SSL_CERT_FILE=/etc/ssl/certs/sfdc-ca.pem
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/sfdc-ca.pem
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
      - /Users/bichengwang/.aisuite/conf/npm-sfdc-certs.pem:/etc/ssl/certs/sfdc-ca.pem:ro
      # Bind-mount the host reports dir so TRADINGAGENTS_REPORTS_DIR resolves
      # to the same absolute path inside the container as on the host.
      - /Users/bichengwang/my-code/other/TradingAgents/reports:/Users/bichengwang/my-code/other/TradingAgents/reports
    tty: true
    stdin_open: true

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  tradingagents-ollama:
    build: .
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=ollama
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    depends_on:
      - ollama
    tty: true
    stdin_open: true
    profiles:
      - ollama

volumes:
  tradingagents_data:
  ollama_data:
